name: backend

on:
  # On push to develop, main, or a v* tag: run the check, then publish the
  # image. No paths filter — a release tag should publish even if its only
  # change was a version bump that didn't touch backend/**.
  push:
    branches: [develop, main]
    tags: ["v*"]
  # On PR: only run the check (no publish), and only when backend/** changed.
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    env:
      # Builds and unit tests use the committed `.sqlx/` cache so the
      # `sqlx::query!` macros do not need a live DB at compile time.
      SQLX_OFFLINE: "true"
      # The `postgres` superuser owns the `postgres` database and has CREATEDB,
      # which is what `#[sqlx::test]` needs to spawn per-test databases.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      # Reads the channel from backend/rust-toolchain.toml (single source of
      # truth) and bundles Swatinem/rust-cache, so no separate cache step.
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rust-src-dir: backend
          components: rustfmt, clippy
          cache-workspaces: backend

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked --version ^0.8

      - name: Apply migrations to the live DB
        # `cargo sqlx prepare --check` re-runs the `sqlx::query!` macros against
        # the live DB, so the schema must exist first. `#[sqlx::test]` migrates
        # its own per-test DBs but not the base `postgres` DB used here.
        run: sqlx migrate run

      - name: Verify .sqlx cache is up to date
        run: cargo sqlx prepare --check -- --all-targets

      - name: cargo test
        run: cargo test --all-targets

  publish:
    name: build + push erbridge-api image
    runs-on: ubuntu-latest
    needs: check
    # Publish only for the develop branch (-> :develop, the staging line) and v*
    # tags (-> :vX.Y.Z + :latest, production). main is the branch releases are cut
    # FROM and is never run as its own environment, so a main push is check-only.
    # PRs never publish.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write

    steps:
      # fetch-depth: 0 fetches full history + tags so `git describe --tags`
      # resolves a tag-relative version in the version step below.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compute the git-tag-derived version + short commit ONCE, outside the image
      # (the Docker build context has no .git/), and pass them in as build args.
      # See RELEASING.md.
      - name: Compute version + commit
        id: version
        run: |
          sha="$(git rev-parse --short HEAD)"
          described="$(git describe --tags --always --dirty)"
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            # A v* tag exists in history: strip the leading "v" for the version string.
            version="${described#v}"
          else
            # Zero-tag bootstrap: `git describe` returns a bare SHA, not semver.
            version="0.0.0-dev.${sha}"
          fi
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "git_commit_sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Computed APP_VERSION=${version} GIT_COMMIT_SHA=${sha}"

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erbridge-api
          # The publish gate only lets develop branch + v* tag pushes reach here, so
          # in practice: :develop on the develop push; :v<x.y.z> + :latest on a tag
          # push; :sha-<short> always.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Release immutability (Failure Mode B): on a v* tag push only, refuse to
      # clobber an already-published :v<semver> image. Mutable :develop / :sha-
      # tags are exempt (this step does not run for them). See RELEASING.md.
      - name: Refuse to overwrite an existing release image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/${{ github.repository_owner }}/erbridge-api:${{ github.ref_name }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "::error::${image} is already published. Release versions are immutable — cut a new v<semver> tag."
            exit 1
          fi
          echo "${image} does not exist yet — OK to publish."

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_COMMIT_SHA=${{ steps.version.outputs.git_commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
