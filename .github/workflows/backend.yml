name: backend

on:
  # On push to develop, main, or a v* tag: run the check, then publish the
  # image. No paths filter — a release tag should publish even if its only
  # change was a version bump that didn't touch backend/**.
  push:
    branches: [develop, main]
    tags: ["v*"]
  # On PR: only run the check (no publish), and only when backend/** changed.
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20

    env:
      # Builds and unit tests use the committed `.sqlx/` cache so the
      # `sqlx::query!` macros do not need a live DB at compile time.
      SQLX_OFFLINE: "true"
      # The `postgres` superuser owns the `postgres` database and has CREATEDB,
      # which is what `#[sqlx::test]` needs to spawn per-test databases.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      CARGO_TERM_COLOR: always

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls --locked --version ^0.8

      - name: Apply migrations to the live DB
        # `cargo sqlx prepare --check` re-runs the `sqlx::query!` macros against
        # the live DB, so the schema must exist first. `#[sqlx::test]` migrates
        # its own per-test DBs but not the base `postgres` DB used here.
        run: sqlx migrate run

      - name: Verify .sqlx cache is up to date
        run: cargo sqlx prepare --check -- --all-targets

      - name: cargo test
        run: cargo test --all-targets

  publish:
    name: build + push erbridge-api image
    runs-on: ubuntu-latest
    needs: check
    # Only publish on branch pushes to develop/main and tag pushes v*.
    # PRs run check but never publish.
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erbridge-api
          # tags: branch name on branch push; sha-<short> always; v<x.y.z> + :latest on tag push.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
