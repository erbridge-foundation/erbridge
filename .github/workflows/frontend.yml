name: frontend

on:
  # On push to develop, main, or a v* tag: run the check, then publish the
  # image. No paths filter — a release tag should publish even if its only
  # change was a version bump that didn't touch frontend/**.
  push:
    branches: [develop, main]
    tags: ["v*"]
  # On PR: only run the check (no publish), and only when frontend/** changed.
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - "justfile"

jobs:
  check:
    name: svelte-check + vitest + playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: just frontend-check
        run: just frontend-check

      - name: just test-frontend-unit
        run: just test-frontend-unit

      - name: just test-frontend-e2e
        run: just test-frontend-e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  publish:
    name: build + push erbridge-web image
    runs-on: ubuntu-latest
    needs: check
    # Only publish on branch pushes to develop/main and tag pushes v*.
    # PRs run check but never publish.
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erbridge-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
