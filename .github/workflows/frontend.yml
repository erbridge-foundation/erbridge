name: frontend

on:
  # On push to develop, main, or a v* tag: run the check, then publish the
  # image. No paths filter — a release tag should publish even if its only
  # change was a version bump that didn't touch frontend/**.
  push:
    branches: [develop, main]
    tags: ["v*"]
  # On PR: only run the check (no publish), and only when frontend/** changed.
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
      - "justfile"

jobs:
  check:
    name: svelte-check + vitest + playwright
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: just frontend-check
        run: just frontend-check

      - name: just test-frontend-unit
        run: just test-frontend-unit

      - name: just test-frontend-e2e
        run: just test-frontend-e2e
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  publish:
    name: build + push erbridge-web image
    runs-on: ubuntu-latest
    needs: check
    # Publish only for the develop branch (-> :develop, the staging line) and v*
    # tags (-> :vX.Y.Z + :latest, production). main is the branch releases are cut
    # FROM and is never run as its own environment, so a main push is check-only.
    # PRs never publish.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: read
      packages: write

    steps:
      # fetch-depth: 0 fetches full history + tags so `git describe --tags`
      # resolves a tag-relative version in the version step below.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compute the git-tag-derived version + short commit ONCE, outside the image
      # (the Docker build context has no .git/), and pass them in as build args.
      # See RELEASING.md.
      - name: Compute version + commit
        id: version
        run: |
          sha="$(git rev-parse --short HEAD)"
          described="$(git describe --tags --always --dirty)"
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            # A v* tag exists in history: strip the leading "v" for the version string.
            version="${described#v}"
          else
            # Zero-tag bootstrap: `git describe` returns a bare SHA, not semver.
            version="0.0.0-dev.${sha}"
          fi
          echo "app_version=${version}" >> "$GITHUB_OUTPUT"
          echo "git_commit_sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Computed APP_VERSION=${version} GIT_COMMIT_SHA=${sha}"

      - name: Extract image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erbridge-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Release immutability (Failure Mode B): on a v* tag push only, refuse to
      # clobber an already-published :v<semver> image. Mutable :develop / :sha-
      # tags are exempt (this step does not run for them). See RELEASING.md.
      - name: Refuse to overwrite an existing release image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          image="ghcr.io/${{ github.repository_owner }}/erbridge-web:${{ github.ref_name }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "::error::${image} is already published. Release versions are immutable — cut a new v<semver> tag."
            exit 1
          fi
          echo "${image} does not exist yet — OK to publish."

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_COMMIT_SHA=${{ steps.version.outputs.git_commit_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
