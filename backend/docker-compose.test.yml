services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: erbridge_test
      POSTGRES_PASSWORD: erbridge_test
      POSTGRES_DB: erbridge_test
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erbridge_test -d erbridge_test"]
      interval: 1s
      timeout: 3s
      retries: 30
